/* helper — get alternative med objects for a given id */
const getAlts=(id)=>(ALTS[id]||[]).map(aid=>MEDS.find(m=>m.id===aid)).filter(Boolean);

/* ════════════════════════ MED CARD ════════════════════════ */
function MedCard({m,score,max,f,sel,catalog=false,onSelectMed=null}){
  const[open,setOpen]=useState(false);
  const theme=useContext(Ctx);
  const t=THEMES[theme]?.vars||THEMES.light.vars;

  // ── DEFENSIVE GUARDS ──
  if(!m||!m.pa) return null;
  const safeF    = f    || {isG:false,isL:false,isC:false,isI:false};
  const safeSel  = sel  || new Set();
  const safeSyms = Array.isArray(m.syms)      ? m.syms      : [];
  const safeAl   = Array.isArray(m.al)        ? m.al        : [];
  const safeCom  = Array.isArray(m.comerciais)? m.comerciais: [];
  const safeDose = m.dose || {a:"—",max:"",p:""};
  const safeCor  = m.cor  || "#10b981";
  const safeVia  = m.via  || "Oral";
  const safeMec  = m.mec  || "—";
  const safeCi   = m.ci   || "—";

  const ws     = getWarns(m, safeF);
  const danger = ws.some(w=>w.d);
  const r      = rgb(safeCor);
  const dose   = (safeF.isC && safeDose.p) ? safeDose.p : (safeDose.a||"—");
  const matched= safeSyms.filter(s=>safeSel.has(s)).map(s=>ALL.find(i=>i.id===s)?.label||s);
  const alts   = getAlts(m.id);
  const isInd  = theme==="industrial";

  const cardBg    = `rgba(${r},.05)`;
  const cardBd    = `${isInd?"2px":"1.5px"} solid rgba(${r},.2)`;
  const cardBdHov = `rgba(${r},.5)`;
  const cardBgHov = `rgba(${r},.1)`;

  return(
    <div className="pg-med"
      onClick={e=>{e.stopPropagation();setOpen(o=>!o);}}
      onMouseEnter={e=>{e.currentTarget.style.background=cardBgHov;e.currentTarget.style.borderColor=cardBdHov;}}
      onMouseLeave={e=>{e.currentTarget.style.background=cardBg;e.currentTarget.style.borderColor=`rgba(${r},.2)`;}}
      style={{background:cardBg,border:cardBd,borderRadius:t["--radius"],
        padding:"14px 16px",cursor:"pointer",transition:"all .18s",opacity:danger?.55:1}}>

      {/* ── TOP ROW ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2,flexWrap:"wrap"}}>
            <span style={{fontFamily:t["--mono"],fontWeight:700,fontSize:16,color:safeCor,letterSpacing:".01em",lineHeight:1.3}}>{m.pa}</span>
            {m.fito&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:t["--radiusSm"],background:t["--fitoBg"],color:t["--fitoText"],border:`1px solid ${t["--fitoBrd"]}`,fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",fontFamily:t["--sans"],flexShrink:0}}>🌿 fito</span>}
            {m.chronic&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:t["--radiusSm"],background:t["--chronicBg"],color:t["--chronicText"],border:`1px solid ${t["--chronicBrd"]}`,fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",fontFamily:t["--sans"],flexShrink:0}}>🏥 crônico</span>}
            {m.fp&&<span className="fp-badge" style={{background:t["--fpBg"],color:t["--fpTxt"],border:`1px solid ${t["--fpBrd"]}`}}>🏛️ Farm. Popular</span>}
            {m.sus&&<span className="fp-badge" style={{background:t["--susBg"],color:t["--susTxt"],border:`1px solid ${t["--susBrd"]}`}}>💊 Farmácia Básica</span>}
          </div>
          {m.fito&&m.planta&&<div style={{fontSize:9.5,color:t["--fito"],fontStyle:"italic",marginBottom:3,fontFamily:t["--sans"],opacity:.85}}>{m.planta} · {m.parte}</div>}
          <div style={{fontSize:10,color:t["--textMuted"],textTransform:"uppercase",letterSpacing:".06em",marginBottom:5,fontFamily:t["--sans"]}}>{m.classe}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
            {safeCom.slice(0,3).map(n=><span key={n} style={{fontSize:9.5,padding:"1px 6px",background:`rgba(${r},.12)`,color:safeCor,borderRadius:t["--radiusSm"],fontWeight:500,fontFamily:t["--sans"]}}>{n}</span>)}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
          {score!==undefined&&!catalog&&max>0&&(
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:40,height:3,background:t["--border"],borderRadius:2,overflow:"hidden"}}>
                <div style={{width:`${Math.min((score/max)*100,100)}%`,height:"100%",background:safeCor,borderRadius:2}}/>
              </div>
              <span style={{fontSize:9.5,color:t["--textMuted"],fontFamily:t["--mono"]}}>{score}/{max}</span>
            </div>
          )}
          <span style={{fontSize:9.5,color:t["--textMuted"],padding:"2px 6px",border:`1px solid ${t["--border"]}`,borderRadius:t["--radiusSm"],fontFamily:t["--sans"]}}>{safeVia}</span>
          <span style={{fontSize:12,color:t["--textMuted"],display:"block",transform:open?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
        </div>
      </div>

      {/* ── DOSE BAR ── */}
      <div style={{marginTop:9,padding:"7px 10px",background:t["--doseBg"],borderRadius:t["--radiusSm"],
        display:"flex",gap:7,alignItems:"flex-start",border:isInd?`1px solid ${t["--border"]}`:"none"}}>
        <span style={{fontSize:9.5,color:t["--textDim"],flexShrink:0,paddingTop:2,fontWeight:700,letterSpacing:".06em",fontFamily:t["--sans"]}}>DOSE</span>
        <span style={{fontFamily:t["--mono"],fontSize:11,color:t["--textMuted"],lineHeight:1.5}}>
          {dose}{safeDose.max&&<span style={{color:t["--textDim"],marginLeft:6}}>· {safeDose.max}</span>}
        </span>
      </div>

      {/* ── PATIENT WARNINGS ── */}
      {ws.length>0&&(
        <div style={{marginTop:6,display:"flex",flexDirection:"column",gap:3}}>
          {ws.map((w,i)=>(
            <div key={i} style={{fontSize:10,padding:"3px 8px",borderRadius:t["--radiusSm"],
              background:w.d?t["--dangerBg"]:t["--warnBg"],
              border:`1px solid ${w.d?t["--dangerBrd"]:t["--warnBrd"]}`,
              color:w.d?t["--dangerTxt"]:t["--warnTxt"],fontFamily:t["--sans"]}}>
              {w.d?"🚫":"⚠️"} {w.s}
            </div>
          ))}
        </div>
      )}

      {/* ── EXPANDED DETAILS ── */}
      {open&&(
        <div style={{marginTop:11,borderTop:`1px solid ${t["--border"]}`,paddingTop:11,
          display:"flex",flexDirection:"column",gap:7}}>

          {matched.length>0&&<DR l="Indicado para" v={matched.join(", ")} c={safeCor} t={t}/>}
          <DR l="Mecanismo" v={safeMec} t={t}/>
          <DR l="Contraindicações" v={safeCi} warn t={t}/>
          {safeAl.length>0&&<DR l="Alertas" v={safeAl.join(" · ")} warn t={t}/>}
          {safeF.isC&&safeDose.p&&<DR l="Dose Pediátrica" v={safeDose.p} c={t["--blue"]} t={t}/>}

          {/* sintomas cobertos (somente no catálogo) */}
          {catalog&&safeSyms.length>0&&(
            <div>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",
                color:t["--textDim"],marginBottom:5,fontFamily:t["--sans"]}}>Sintomas cobertos</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {safeSyms.map(s=>{
                  const lbl=ALL.find(i=>i.id===s)?.label||s;
                  return(
                    <span key={s} style={{fontSize:9.5,padding:"1px 7px",borderRadius:20,
                      background:t["--accentBg"],color:t["--accentText"],
                      border:`1px solid ${t["--accentBrd"]}`,fontFamily:t["--sans"]}}>{lbl}</span>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── ALTERNATIVAS ── */}
          {alts.length>0&&(
            <div style={{marginTop:2}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",
                color:t["--warn"],marginBottom:6,fontFamily:t["--sans"],
                display:"flex",alignItems:"center",gap:5}}>
                <span>🔄</span> Substitutos em falta
                {onSelectMed&&<span style={{fontSize:8.5,color:t["--textDim"],fontWeight:400,textTransform:"none",letterSpacing:0}}>— clique para ver detalhes</span>}
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {alts.map(alt=>{
                  const ar=rgb(alt.cor||"#10b981");
                  const clickable=!!onSelectMed;
                  return(
                    <div key={alt.id}
                      onClick={clickable?(e=>{e.stopPropagation();onSelectMed(alt);}):undefined}
                      style={{display:"flex",alignItems:"center",gap:8,
                        padding:"9px 11px",borderRadius:t["--radiusSm"],
                        background:`rgba(${ar},.06)`,
                        border:`1.5px solid rgba(${ar},.22)`,
                        cursor:clickable?"pointer":"default",
                        transition:clickable?"all .16s":"none",
                        position:"relative"}}>
                      <div style={{width:3,height:38,borderRadius:2,background:alt.cor||"#10b981",flexShrink:0}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontFamily:t["--mono"],fontSize:12,fontWeight:700,
                          color:alt.cor||"#10b981",lineHeight:1.2,marginBottom:2}}>{alt.pa}</div>
                        <div style={{fontSize:9.5,color:t["--textMuted"],fontFamily:t["--sans"],
                          textTransform:"uppercase",letterSpacing:".05em",marginBottom:3}}>{alt.classe}</div>
                        <div style={{fontSize:10.5,color:t["--textDim"],fontFamily:t["--mono"]}}>
                          {(alt.dose?.a)||"—"}
                        </div>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4,flexShrink:0}}>
                        {(alt.comerciais||[]).slice(0,1).map(n=>(
                          <span key={n} style={{fontSize:9,padding:"2px 6px",
                            background:`rgba(${ar},.13)`,color:alt.cor||"#10b981",
                            borderRadius:t["--radiusSm"],fontFamily:t["--sans"],fontWeight:500}}>{n}</span>
                        ))}
                        {alt.fito&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:t["--radiusSm"],
                          background:t["--fitoBg"],color:t["--fitoText"],
                          border:`1px solid ${t["--fitoBrd"]}`,fontWeight:700,fontFamily:t["--sans"]}}>🌿</span>}
                        {clickable&&<span style={{fontSize:13,color:`rgba(${ar},.7)`,marginTop:2}}>›</span>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function DR({l,v,c,warn,t}){
  if(!t) return null;
  return(
    <div style={{display:"flex",gap:9,alignItems:"flex-start"}}>
      <span style={{fontSize:9,fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",
        color:warn?t["--warn"]:(c||t["--textDim"]),flexShrink:0,width:88,
        paddingTop:2,lineHeight:1.4,fontFamily:t["--sans"]}}>{l}</span>
      <span style={{fontSize:11,color:warn?t["--warnTxt"]:t["--textMuted"],
        lineHeight:1.6,fontFamily:t["--sans"]}}>{v||"—"}</span>
    </div>
  );
}

/* ════════════════════════ CHRONIC WARNING BANNER ════════════════════════ */
function ChronicBanner({sel,t}){
  const hasChronic=[...sel].some(s=>CHRONIC_IDS.has(s));
  if(!hasChronic) return null;
  return(
    <div style={{marginBottom:14,padding:"12px 15px",borderRadius:t["--radius"],
      background:t["--chronicBg"],border:`2px solid ${t["--chronicBrd"]}`,
      display:"flex",gap:11,alignItems:"flex-start"}}>
      <span style={{fontSize:20,flexShrink:0}}>🏥</span>
      <div>
        <div style={{fontWeight:700,fontSize:12.5,color:t["--chronicText"],fontFamily:t["--sans"],marginBottom:3}}>
          Condição Crônica Detectada
        </div>
        <div style={{fontSize:11.5,color:t["--chronic"],lineHeight:1.65,fontFamily:t["--sans"]}}>
          Pressão alta, diabetes e colesterol/triglicerídios elevados <strong>requerem acompanhamento médico e tratamento farmacológico prescrito</strong>.
          Os fitoterápicos listados são <strong>recursos complementares</strong>, não substitutos de medicamentos prescritos.
          Sempre oriente o paciente a manter consultas regulares e nunca suspender medicamentos sem orientação médica.
        </div>
      </div>
    </div>
  );
}

/* ════════════════════════ CATALOG VIEW ════════════════════════ */
function CatalogView({f,t,theme,onSelectMed}){
  const[cSearch,setCSearch]=useState("");
  const[cFilter,setCFilter]=useState("all");
  const isInd=theme==="industrial";
  const filtered=useMemo(()=>{
    const q=cSearch.toLowerCase();
    return MEDS.filter(m=>{
      if(cFilter==="conv"&&m.fito) return false;
      if(cFilter==="fito"&&!m.fito) return false;
      if(cFilter==="chronic"&&!m.chronic) return false;
      if(cFilter==="fp"&&!m.fp) return false;
      if(cFilter==="sus"&&!m.sus) return false;
      if(!q) return true;
      return m.pa.toLowerCase().includes(q)||m.classe.toLowerCase().includes(q)||m.comerciais.some(c=>c.toLowerCase().includes(q));
    }).sort((a,b)=>a.pa.localeCompare(b.pa,"pt-BR"));
  },[cSearch,cFilter]);
  const btnS=(active,color)=>({padding:"5px 12px",cursor:"pointer",fontFamily:t["--sans"],fontSize:11,fontWeight:active?700:400,borderRadius:isInd?"2px":"20px",transition:"all .16s",background:active?(color||t["--accentBg"]):"transparent",color:active?(color?t["--chronicText"]:t["--accentText"]):t["--textMuted"],border:`1px solid ${active?(color||t["--accentBrd"]):t["--border"]}`,});
  return(
    <>
      <div style={{marginBottom:14}}>
        <h2 style={{fontSize:15.5,fontWeight:700,marginBottom:2,fontFamily:t["--sans"],color:t["--text"],letterSpacing:isInd?".04em":"normal",textTransform:isInd?"uppercase":"none"}}>Catálogo Completo</h2>
        <p style={{fontSize:11,color:t["--textMuted"],fontFamily:t["--sans"]}}>{MEDS.length} medicamentos · {MEDS.filter(m=>m.fito).length} fitoterápicos · {MEDS.filter(m=>m.chronic).length} para condições crônicas · Clique para detalhes</p>
      </div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12,alignItems:"center"}}>
        {[["all","Todos"],["conv","Convencionais"],["fito","🌿 Fitoterápicos"],["fp","🏛️ Farmácia Popular"],["sus","💊 Farmácia Básica SUS"],["chronic","🏥 Crônicos"]].map(([id,lbl])=>(
          <button key={id} onClick={()=>setCFilter(id)} style={btnS(cFilter===id, id==="chronic"?t["--chronicBg"]:null)}>{lbl}</button>
        ))}
        <div style={{flex:1,minWidth:150}}>
          <input type="text" placeholder="🔍  Buscar..." value={cSearch} onChange={e=>setCSearch(e.target.value)}
            style={{width:"100%",background:t["--surface2"],border:`1px solid ${t["--border"]}`,borderRadius:t["--radiusSm"],padding:"6px 10px",fontSize:12,color:t["--text"],outline:"none",fontFamily:t["--sans"]}}/>
        </div>
      </div>
      <div style={{marginBottom:12,display:"flex",justifyContent:"flex-end"}}>

    {id:"sus",  lbl:"Farmácia Básica SUS", ico:"💊", cnt:susCount,  bg:t["--susBg"]||t["--accentBg"], clr:t["--susTxt"]||t["--accentText"], brd:t["--susBrd"]||t["--accentBrd"]},

/* ════════════════════════ DRUG DETAIL PANEL ════════════════════════ */
function DrugDetailPanel({stack,onClose,onBack,onOpen,f}){
  const theme=useContext(Ctx);
  const t=THEMES[theme]?.vars||THEMES.light.vars;
  const isInd=theme==="industrial";
  const med=stack[stack.length-1];
  if(!med) return null;

  const safeCor = med.cor||"#10b981";
  const safeAl  = Array.isArray(med.al)?med.al:[];
  const safeCom = Array.isArray(med.comerciais)?med.comerciais:[];
  const safeSyms= Array.isArray(med.syms)?med.syms:[];
  const safeDose= med.dose||{a:"—",max:"",p:""};
  const safeVia = med.via||"Oral";
  const dose    = (f.isC&&safeDose.p)?safeDose.p:(safeDose.a||"—");
  const ws      = getWarns(med,f);
  const alts    = getAlts(med.id);
  const r       = rgb(safeCor);
  const panelW  = typeof window!=="undefined"?Math.min(500,window.innerWidth):400;

  const breadcrumb = stack.length>1
    ? stack.slice(0,-1).map(m=>m.pa.split(" ").slice(0,3).join(" ")).join(" › ")
    : null;

  return(
    <>
      {/* Backdrop */}
      <div onClick={onClose} style={{position:"fixed",inset:0,
        background:"rgba(0,0,0,.5)",zIndex:498,animation:"pgFade .22s ease"}}/>

      {/* Sliding panel */}
      <div style={{
        position:"fixed",top:0,right:0,
        width:panelW,height:"100vh",
        background:t["--surface"],
        zIndex:499,
        display:"flex",flexDirection:"column",
        boxShadow:"-6px 0 32px rgba(0,0,0,.22)",
        animation:"pgPanelIn .26s ease",
      }}>

        {/* Panel header */}
        <div style={{
          height:52,flexShrink:0,padding:"0 14px",
          display:"flex",alignItems:"center",justifyContent:"space-between",
          borderBottom:`${isInd?"2px":"1px"} solid ${t["--border"]}`,
          background:t["--hdrBg"],gap:10,
        }}>
          <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0,flex:1}}>
            {stack.length>1&&(
              <button onClick={e=>{e.stopPropagation();onBack();}}
                style={{background:t["--surface2"],border:`1px solid ${t["--border"]}`,
                  borderRadius:isInd?"2px":"8px",padding:"5px 9px",cursor:"pointer",
                  color:t["--textMuted"],fontFamily:t["--sans"],fontSize:13,flexShrink:0,
                  display:"flex",alignItems:"center",gap:4}}>
                ← <span style={{fontSize:11}}>Voltar</span>
              </button>
            )}
            <div style={{minWidth:0,overflow:"hidden"}}>
              {breadcrumb&&(
                <div style={{fontSize:9.5,color:t["--textDim"],fontFamily:t["--sans"],
                  whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                  marginBottom:1}}>{breadcrumb} ›</div>
              )}
              <div style={{fontSize:11,fontWeight:700,letterSpacing:".04em",
                textTransform:"uppercase",color:t["--textMuted"],fontFamily:t["--sans"],
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                Detalhe do Medicamento
              </div>
            </div>
          </div>
          <button onClick={onClose}
            style={{background:t["--dangerBg"],border:`1px solid ${t["--dangerBrd"]}`,
              borderRadius:isInd?"2px":"8px",width:32,height:32,cursor:"pointer",
              color:t["--dangerTxt"],fontSize:15,flexShrink:0,display:"flex",
              alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>

        {/* Scrollable body */}
        <div className="pg-sc" style={{flex:1,overflowY:"auto",padding:"18px 16px"}}>

          {/* Drug hero card */}
          <div style={{padding:"16px",marginBottom:20,borderRadius:t["--radius"],
            background:`rgba(${r},.06)`,border:`2px solid rgba(${r},.28)`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:t["--mono"],fontWeight:700,fontSize:17,
                  color:safeCor,lineHeight:1.25,marginBottom:5}}>{med.pa}</div>
                {med.fito&&med.planta&&(
                  <div style={{fontSize:11,color:t["--fito"],fontStyle:"italic",
                    marginBottom:5,fontFamily:t["--sans"]}}>{med.planta} · {med.parte}</div>
                )}
                <div style={{fontSize:10.5,color:t["--textMuted"],textTransform:"uppercase",
                  letterSpacing:".06em",marginBottom:9,fontFamily:t["--sans"]}}>{med.classe}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {safeCom.map(n=>(
                    <span key={n} style={{fontSize:11,padding:"3px 9px",
                      background:`rgba(${r},.13)`,color:safeCor,
                      borderRadius:t["--radiusSm"],fontWeight:500,fontFamily:t["--sans"]}}>{n}</span>
                  ))}
                </div>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:5,alignItems:"flex-end",flexShrink:0}}>
                {med.fito&&<span style={{fontSize:9.5,padding:"2px 7px",borderRadius:t["--radiusSm"],
                  background:t["--fitoBg"],color:t["--fitoText"],border:`1px solid ${t["--fitoBrd"]}`,
                  fontWeight:700,fontFamily:t["--sans"]}}>🌿 fito</span>}
                {med.chronic&&<span style={{fontSize:9.5,padding:"2px 7px",borderRadius:t["--radiusSm"],
                  background:t["--chronicBg"],color:t["--chronicText"],border:`1px solid ${t["--chronicBrd"]}`,
                  fontWeight:700,fontFamily:t["--sans"]}}>🏥 crônico</span>}
                <span style={{fontSize:10.5,padding:"3px 9px",border:`1px solid ${t["--border"]}`,
                  borderRadius:t["--radiusSm"],color:t["--textMuted"],fontFamily:t["--sans"]}}>{safeVia}</span>
              </div>
            </div>
          </div>

          {/* Posologia */}
          <PanelSection title="Posologia" icon="💊" t={t}>
            <PanelDoseCard safeDose={safeDose} dose={dose} f={f} t={t} safeCor={safeCor}/>
          </PanelSection>

          {/* Patient warnings */}
          {ws.length>0&&(
            <PanelSection title="Alertas de Perfil" icon="👤" t={t} warn>
              {ws.map((w,i)=>(
                <div key={i} style={{fontSize:12.5,padding:"9px 12px",borderRadius:t["--radiusSm"],
                  marginBottom:5,background:w.d?t["--dangerBg"]:t["--warnBg"],
                  border:`1px solid ${w.d?t["--dangerBrd"]:t["--warnBrd"]}`,
                  color:w.d?t["--dangerTxt"]:t["--warnTxt"],fontFamily:t["--sans"]}}>
                  {w.d?"🚫":"⚠️"} {w.s}
                </div>
              ))}
            </PanelSection>
          )}

          {/* Mechanism */}
          <PanelSection title="Mecanismo de Ação" icon="⚗️" t={t}>
            <p style={{fontSize:13,color:t["--text"],lineHeight:1.75,fontFamily:t["--sans"]}}>{med.mec||"—"}</p>
          </PanelSection>

          {/* Contraindications */}
          <PanelSection title="Contraindicações" icon="🚫" t={t} warn>
            <p style={{fontSize:12.5,color:t["--warnTxt"],lineHeight:1.75,fontFamily:t["--sans"]}}>{med.ci||"—"}</p>
          </PanelSection>

          {/* Alerts */}
          {safeAl.length>0&&(
            <PanelSection title="Alertas Importantes" icon="⚠️" t={t} warn>
              {safeAl.map((a,i)=>(

          {/* Symptoms covered */}
          {safeSyms.length>0&&(
            <PanelSection title="Indicado Para" icon="🩺" t={t}>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {safeSyms.map(s=>{
                  const lbl=ALL.find(i=>i.id===s)?.label||s;
                  return(
                    <span key={s} style={{fontSize:11.5,padding:"4px 11px",borderRadius:20,
                      background:t["--accentBg"],color:t["--accentText"],
                      border:`1px solid ${t["--accentBrd"]}`,fontFamily:t["--sans"]}}>{lbl}</span>
                  );
                })}
              </div>
            </PanelSection>
          )}

          {/* Program availability */}
          {(med.fp||med.sus)&&(
            <PanelSection title="Disponível Gratuitamente" icon="🏛️" t={t}>
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                {med.fp&&(
                  <div style={{padding:"11px 14px",borderRadius:t["--radiusSm"],
                    background:t["--fpBg"],border:`1.5px solid ${t["--fpBrd"]}`}}>
                    <div style={{fontWeight:700,fontSize:12.5,color:t["--fpTxt"],fontFamily:t["--sans"],marginBottom:4,display:"flex",alignItems:"center",gap:6}}>
                      <span>🏛️</span> Farmácia Popular (Aqui Tem Farmácia Popular)

                    <div style={{fontSize:11.5,color:t["--fp"],lineHeight:1.65,fontFamily:t["--sans"],marginBottom:5}}>

                  <div style={{padding:"11px 14px",borderRadius:t["--radiusSm"],
                    background:t["--susBg"],border:`1.5px solid ${t["--susBrd"]}`}}>

                          background:t["--fitoBg"],color:t["--fitoText"],
                          border:`1px solid ${t["--fitoBrd"]}`,fontWeight:700,fontFamily:t["--sans"]}}>🌿</span>}
                        {alt.chronic&&<span style={{fontSize:9,padding:"1px 5px",borderRadius:t["--radiusSm"],
                          background:t["--chronicBg"],color:t["--chronicText"],
                          border:`1px solid ${t["--chronicBrd"]}`,fontWeight:700,fontFamily:t["--sans"]}}>🏥</span>}
                        <span style={{fontSize:18,color:`rgba(${ar},.6)`,lineHeight:1}}>›</span>
                      </div>
                    </button>
                  );
                })}
              </div>
            </PanelSection>
          )}

          <div style={{height:24}}/>
        </div>
      </div>
    </>
  );
}

function FarmaciaONG(){
  const[theme,setTheme]=useState("light");
  const[mode,setMode]=useState("symptoms");
  const[tab,setTab]=useState("conv");
  const[medStack,setMedStack]=useState([]);
  const openMedDetail =useCallback(med=>setMedStack(p=>[...p,med]),[]);
  const closeMedDetail=useCallback(()=>setMedStack([]),[]);
  const goBackDetail  =useCallback(()=>setMedStack(p=>p.slice(0,-1)),[]);
  const[sidebarOpen,setSidebarOpen]=useState(()=>typeof window!=="undefined"&&window.innerWidth>700);
  const[isMobile,setIsMobile]=useState(()=>typeof window!=="undefined"&&window.innerWidth<=700);
  useEffect(()=>{
    const onResize=()=>{
      const mob=window.innerWidth<=700;
      setIsMobile(mob);
      if(!mob) setSidebarOpen(true);
    };
    window.addEventListener("resize",onResize);
    return()=>window.removeEventListener("resize",onResize);
  },[]);
  const[sel,setSel]=useState(new Set());
  const[idade,setIdade]=useState("");
  const[grupo,setGrupo]=useState("");
  const[search,setSearch]=useState("");
  const[openG,setOpenG]=useState(new Set(GROUPS.map(g=>g.label)));
  const t=THEMES[theme].vars;
  const f=getFlags(grupo,idade);
  const isInd=theme==="industrial";

  const allRanked=useMemo(()=>{
    if(!sel.size) return[];
    return MEDS.map(m=>({m,score:m.syms.filter(s=>sel.has(s)).length})).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  },[sel]);
  const convRanked=useMemo(()=>allRanked.filter(x=>!x.m.fito),[allRanked]);
  const fitoRanked=useMemo(()=>allRanked.filter(x=>x.m.fito),[allRanked]);
  const fpRanked  =useMemo(()=>allRanked.filter(x=>x.m.fp),  [allRanked]);
  const susRanked =useMemo(()=>allRanked.filter(x=>x.m.sus), [allRanked]);
  const ranked=tab==="fito"?fitoRanked:tab==="fp"?fpRanked:tab==="sus"?susRanked:convRanked;
  const maxScore=ranked.length?ranked[0].score:1;

  const toggle=useCallback(id=>{setSel(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});},[]);
  const filtered=useMemo(()=>{if(!search) return GROUPS;const q=search.toLowerCase();return GROUPS.map(g=>({...g,items:g.items.filter(i=>i.label.toLowerCase().includes(q))})).filter(g=>g.items.length);},[search]);
  const profile=f.isG?"Gestante":f.isL?"Lactante":f.isC?"Criança":f.isI?"Idoso":null;
  const inp={background:t["--surface2"],border:`1px solid ${t["--border"]}`,borderRadius:t["--radiusSm"],padding:"7px 10px",fontSize:12,color:t["--text"],outline:"none",width:"100%",fontFamily:t["--sans"]};

  return(
    <Ctx.Provider value={theme}>
      <div style={{display:"flex",flexDirection:"column",height:"100vh",background:t["--bg"],color:t["--text"],fontFamily:t["--sans"],overflow:"hidden"}}>

        {/* HEADER */}
        <div style={{background:t["--hdrBg"],borderBottom:`${isInd?"2px":"1px"} solid ${t["--hdrBrd"]}`,padding:"0 18px",height:52,display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button
              className="pg-menu-btn"
              onClick={()=>setSidebarOpen(o=>!o)}
              title={sidebarOpen?"Fechar menu":"Abrir menu"}
              style={{background:sidebarOpen?t["--accentBg"]:t["--surface3"],
                color:sidebarOpen?t["--accentText"]:t["--textMuted"],
                border:`1px solid ${sidebarOpen?t["--accentBrd"]:t["--border"]}`,
                fontSize:16,borderRadius:isInd?"2px":"8px"}}>
              {sidebarOpen?"✕":"☰"}
            </button>
            <div style={{width:28,height:28,borderRadius:isInd?"2px":"7px",background:isInd?t["--accent"]:"linear-gradient(135deg,#059669,#0a7c52)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:14,color:"white",border:isInd?`2px solid ${t["--accentText"]}`:"none"}}>✚</div>
            <span style={{fontWeight:700,fontSize:14.5,color:isInd?t["--bg"]:t["--text"],fontFamily:isInd?"'Georgia',serif":t["--sans"],letterSpacing:isInd?".05em":".01em",textTransform:isInd?"uppercase":"none"}}>Guia Farmácia</span>
            <span style={{fontSize:9,padding:"3px 7px",borderRadius:isInd?"2px":"4px",background:t["--tagBg"],color:t["--tagTxt"],border:`1px solid ${t["--tagBrd"]}`,letterSpacing:".08em",fontWeight:700,textTransform:"uppercase",fontFamily:t["--sans"],display:isMobile?"none":"inline-block"}}>ONG · Dispensação</span>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            {mode==="symptoms"&&sel.size>0&&<span style={{fontSize:10.5,color:t["--textMuted"],marginRight:2,fontFamily:t["--sans"],display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}><span style={{color:t["--accentText"]}}>{sel.size} sint.</span><span style={{color:t["--border2"]}}>·</span><span style={{color:t["--blue"]}}>💊{convRanked.length}</span><span style={{color:t["--border2"]}}>·</span><span style={{color:t["--fito"]}}>🌿{fitoRanked.length}</span><span style={{color:t["--border2"]}}>·</span><span style={{color:t["--fp"]||t["--blue"]}}>🏛️{fpRanked.length}</span><span style={{color:t["--border2"]}}>·</span><span style={{color:t["--sus"]||t["--accent"]}}>UBS {susRanked.length}</span></span>}
            {Object.keys(THEMES).map(id=><ThemeBtn key={id} id={id} current={theme} onChange={setTheme}/>)}
          </div>
        </div>

        {/* BODY */}
        <div style={{display:"flex",flex:1,overflow:"hidden",position:"relative"}}>

          {/* BACKDROP mobile */}
          {isMobile&&sidebarOpen&&(
            <div className="pg-backdrop" onClick={()=>setSidebarOpen(false)}/>
          )}

          {/* LEFT PANEL */}
          <div
            className={sidebarOpen?"pg-sidebar":""}
            style={{
              width: sidebarOpen ? 284 : 0,
              flexShrink: 0,
              background: t["--surface"],
              borderRight: sidebarOpen ? `${isInd?"2px":"1px"} solid ${t["--border"]}` : "none",
              display: "flex",
              flexDirection: "column",
              overflow: "hidden",
              transition: "width .25s ease",
              // Mobile: drawer overlay
              ...(isMobile && sidebarOpen ? {
                position:"fixed",
                top:52,
                left:0,
                width:284,
                height:"calc(100vh - 52px)",
                zIndex:199,
                boxShadow:"4px 0 24px rgba(0,0,0,.18)",
              } : {}),
            }}>
            {/* patient */}
            <div style={{padding:"11px 13px",borderBottom:`1px solid ${t["--border"]}`,flexShrink:0}}>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:t["--textDim"],marginBottom:7,fontFamily:t["--sans"]}}>Perfil do Paciente</div>
              <div style={{display:"flex",gap:6}}>
                <input type="number" placeholder="Idade" value={idade} onChange={e=>setIdade(e.target.value)} style={{...inp,flex:1}}/>
                <select value={grupo} onChange={e=>setGrupo(e.target.value)} style={{...inp,flex:"1.8",color:grupo?t["--text"]:t["--textMuted"]}}>
                  <option value="">Grupo especial</option>
                  <option value="gestante">Gestante</option>
                  <option value="lactante">Lactante</option>
                  <option value="crianca">Criança (&lt;12 anos)</option>
                  <option value="idoso">Idoso (&gt;65 anos)</option>
                </select>
              </div>
              {profile&&<div style={{marginTop:6,fontSize:10,padding:"3px 8px",borderRadius:t["--radiusSm"],background:t["--warnBg"],border:`1px solid ${t["--warnBrd"]}`,color:t["--warnTxt"],fontFamily:t["--sans"]}}>⚠️ Perfil: <strong>{profile}</strong></div>}
            </div>
            {/* search */}
            {mode==="symptoms"&&<div style={{padding:"8px 13px",borderBottom:`1px solid ${t["--border"]}`,flexShrink:0}}><input type="text" placeholder="🔍  Buscar sintoma..." value={search} onChange={e=>setSearch(e.target.value)} style={inp}/></div>}
            {/* symptom groups */}
            {mode==="symptoms"&&(
              <div className="pg-sc" style={{flex:1,overflowY:"auto",padding:"5px 0"}}>
                {filtered.map(grp=>(
                  <div key={grp.label}>
                    <button className="pg-grp"
                      onClick={()=>setOpenG(p=>{const n=new Set(p);n.has(grp.label)?n.delete(grp.label):n.add(grp.label);return n;})}
                      style={{width:"100%",display:"flex",alignItems:"center",gap:6,padding:"6px 13px",background:grp.chronic?`${t["--chronicBg"]}40`:"transparent",border:"none",cursor:"pointer",textAlign:"left",fontFamily:t["--sans"],borderLeft:grp.chronic?`3px solid ${t["--chronicBrd"]}`:"3px solid transparent"}}>
                      <span style={{fontSize:11}}>{grp.icon}</span>
                      <span style={{fontSize:9.5,fontWeight:700,letterSpacing:".09em",textTransform:"uppercase",color:grp.chronic?t["--chronicText"]:t["--textDim"],flex:1}}>{grp.label}</span>
                      {grp.chronic&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:t["--radiusSm"],background:t["--chronicBg"],color:t["--chronicText"],border:`1px solid ${t["--chronicBrd"]}`,fontWeight:700,letterSpacing:".05em"}}>CRÔNICO</span>}
                      <span style={{fontSize:10,color:t["--textDim"],display:"block",transform:openG.has(grp.label)?"rotate(180deg)":"none",transition:"transform .2s"}}>▾</span>
                    </button>
                    {openG.has(grp.label)&&(
                      <div style={{padding:"1px 9px 6px"}}>
                        {grp.items.map(item=>{
                          const on=sel.has(item.id);
                          const isChr=CHRONIC_IDS.has(item.id);
                          return(
                            <button key={item.id} className="pg-sym" onClick={()=>toggle(item.id)}
                              style={{display:"flex",justifyContent:"space-between",alignItems:"center",width:"100%",textAlign:"left",padding:"6px 10px",marginBottom:2,borderRadius:t["--radiusSm"],
                                border:on?(isChr?`1px solid ${t["--chronicBrd"]}`:`1px solid ${t["--accentBrd"]}`):`1px solid ${t["--border"]}`,
                                background:on?(isChr?t["--chronicBg"]:t["--accentBg"]):t["--surface2"],
                                color:on?(isChr?t["--chronicText"]:t["--accentText"]):t["--textMuted"],
                                fontSize:12,fontWeight:on?600:400,cursor:"pointer",transition:"all .14s",fontFamily:t["--sans"]}}>
                              {item.label}
                              {on&&<span style={{fontSize:10,color:isChr?t["--chronic"]:t["--accent"],flexShrink:0}}>✓</span>}
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
            {mode==="catalog"&&<div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",flexDirection:"column",gap:10}}><span style={{fontSize:28}}>📋</span><p style={{fontSize:11.5,color:t["--textMuted"],textAlign:"center",lineHeight:1.7,fontFamily:t["--sans"]}}>Catálogo completo ativo.<br/><span style={{fontSize:10.5,color:t["--textDim"]}}>Volte ao modo de sintomas para filtrar por condição.</span></p></div>}
            {/* clear */}
            {mode==="symptoms"&&sel.size>0&&<div style={{padding:"9px 13px",borderTop:`1px solid ${t["--border"]}`,flexShrink:0}}><button className="pg-clr" onClick={()=>setSel(new Set())} style={{width:"100%",padding:"7px",borderRadius:t["--radiusSm"],background:t["--dangerBg"],border:`1px solid ${t["--dangerBrd"]}`,color:t["--dangerTxt"],fontSize:11.5,fontWeight:600,cursor:"pointer",fontFamily:t["--sans"]}}>✕ Limpar seleção ({sel.size})</button></div>}
            {/* MEDICAMENTOS nav */}
            <div style={{borderTop:`${isInd?"2px":"1px"} solid ${t["--border"]}`,flexShrink:0}}>
              <button className="pg-nav" onClick={()=>setMode(m=>m==="catalog"?"symptoms":"catalog")}
                style={{width:"100%",padding:"12px 15px",background:mode==="catalog"?t["--accentBg"]:t["--surface"],border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:10,transition:"all .18s",fontFamily:t["--sans"],borderTop:mode==="catalog"?`2px solid ${t["--accentBrd"]}`:"2px solid transparent"}}>
                <div style={{width:32,height:32,borderRadius:t["--radiusSm"],background:mode==="catalog"?t["--accent"]:t["--surface3"],display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,transition:"background .18s"}}>📋</div>
                <div style={{textAlign:"left"}}>
                  <div style={{fontSize:11.5,fontWeight:700,letterSpacing:".05em",textTransform:"uppercase",color:mode==="catalog"?t["--accentText"]:t["--textMuted"],fontFamily:t["--sans"]}}>Medicamentos</div>
                  <div style={{fontSize:10,color:t["--textDim"],fontFamily:t["--sans"]}}>{mode==="catalog"?`${MEDS.length} no catálogo · clique para voltar`:`Ver ${MEDS.length} medicamentos cadastrados`}</div>
                </div>
              </button>
            </div>
          </div>

          {/* RIGHT PANEL */}
          <div className="pg-sc" onClick={()=>{if(isMobile&&sidebarOpen)setSidebarOpen(false);}} style={{flex:1,overflowY:"auto",padding:"18px 20px"}}>
            {mode==="catalog"?<CatalogView f={f} t={t} theme={theme} onSelectMed={openMedDetail}/>
            :!sel.size?<Empty t={t}/>
            :(
              <>
                <TabBar tab={tab} setTab={setTab} convCount={convRanked.length} fitoCount={fitoRanked.length} fpCount={fpRanked.length} susCount={susRanked.length} t={t} theme={theme}/>
                <ChronicBanner sel={sel} t={t}/>
                {tab==="fito"&&(
                  <div style={{marginBottom:14,padding:"12px 15px",borderRadius:t["--radius"],background:t["--fitoBg"],border:`1.5px solid ${t["--fitoBrd"]}`,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:20}}>🌿</span>
                    <div><div style={{fontWeight:700,fontSize:12.5,color:t["--fitoText"],fontFamily:t["--sans"],marginBottom:2}}>Fitoterápicos</div>
                    <div style={{fontSize:11,color:t["--fito"],lineHeight:1.65,fontFamily:t["--sans"]}}>Medicamentos de origem vegetal. Cada card mostra nome científico e mecanismo de ação. <strong>Confirme contraindicações antes da dispensação.</strong></div></div>
                  </div>
                )}
                {tab==="conv"&&(
                  <div style={{marginBottom:14,padding:"12px 15px",borderRadius:t["--radius"],background:t["--accentBg"],border:`1.5px solid ${t["--accentBrd"]}`,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:20}}>💊</span>
                    <div><div style={{fontWeight:700,fontSize:12.5,color:t["--accentText"],fontFamily:t["--sans"],marginBottom:2}}>Medicamentos Convencionais</div>
                    <div style={{fontSize:11,color:t["--accent"],lineHeight:1.65,fontFamily:t["--sans"]}}>Medicamentos alopáticos correspondentes aos sintomas. <strong>Verifique alergias, interações e perfil do paciente.</strong></div></div>
                  </div>
                )}
                {tab==="fp"&&(
                  <div style={{marginBottom:14,padding:"12px 15px",borderRadius:t["--radius"],background:t["--fpBg"]||t["--blueBg"],border:`1.5px solid ${t["--fpBrd"]||t["--blue"]}`,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:20}}>🏛️</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:12.5,color:t["--fpTxt"]||t["--blueTxt"],fontFamily:t["--sans"],marginBottom:2}}>Farmácia Popular — 100% Gratuito</div>
                      <div style={{fontSize:11,color:t["--fp"]||t["--blue"],lineHeight:1.65,fontFamily:t["--sans"],marginBottom:4}}>
                        Medicamentos disponíveis <strong>gratuitamente</strong> nas farmácias credenciadas "Aqui Tem Farmácia Popular". Apresente receita válida (SUS ou particular) + documento com foto e CPF.
                      </div>
                      <div style={{fontSize:10.5,color:t["--fpTxt"]||t["--blueTxt"],fontFamily:t["--sans"],padding:"6px 10px",background:"rgba(0,0,0,.04)",borderRadius:t["--radiusSm"]}}>
                        📍 <strong>Cascavel-PR:</strong> consulte farmácias credenciadas em <strong>consultafp.saude.gov.br</strong> ou ligue <strong>136</strong>
                      </div>
                    </div>
                  </div>
                )}
                {tab==="sus"&&(
                  <div style={{marginBottom:14,padding:"12px 15px",borderRadius:t["--radius"],background:t["--susBg"]||t["--accentBg"],border:`1.5px solid ${t["--susBrd"]||t["--accentBrd"]}`,display:"flex",gap:10,alignItems:"flex-start"}}>
                    <span style={{fontSize:20}}>🏥</span>
                    <div>
                      <div style={{fontWeight:700,fontSize:12.5,color:t["--susTxt"]||t["--accentText"],fontFamily:t["--sans"],marginBottom:2}}>Farmácia Básica SUS — CBAF/RENAME</div>
                      <div style={{fontSize:11,color:t["--sus"]||t["--accent"],lineHeight:1.65,fontFamily:t["--sans"],marginBottom:4}}>
                        Medicamentos do Componente Básico da Assistência Farmacêutica, <strong>gratuitos nas UBS</strong> (Unidades Básicas de Saúde). Apresente receita médica + CPF + Cartão SUS.
                      </div>
                      <div style={{fontSize:10.5,color:t["--susTxt"]||t["--accentText"],fontFamily:t["--sans"],padding:"6px 10px",background:"rgba(0,0,0,.04)",borderRadius:t["--radiusSm"]}}>
                        📍 <strong>Cascavel-PR — Farmácia Básica:</strong> Av. Tancredo Neves, 1453 · WhatsApp: <strong>(45) 3321-5529</strong>
                      </div>
                    </div>
                  </div>
                )}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11,flexWrap:"wrap",gap:8}}>
                  <div><h2 style={{fontSize:15,fontWeight:700,marginBottom:2,fontFamily:t["--sans"],color:t["--text"],letterSpacing:isInd?".04em":"normal",textTransform:isInd?"uppercase":"none"}}>{tab==="fito"?"🌿 Fitoterápicos":tab==="fp"?"🏛️ Farmácia Popular":tab==="sus"?"🏥 Farmácia Básica SUS":"💊 Medicamentos Sugeridos"}</h2><p style={{fontSize:10.5,color:t["--textMuted"],fontFamily:t["--sans"]}}>Ordenados por relevância · Clique no card para expandir</p></div>
                  <span style={{fontSize:10,padding:"3px 10px",borderRadius:20,background:tab==="fito"?t["--fitoBg"]:t["--tagBg"],color:tab==="fito"?t["--fitoText"]:t["--tagTxt"],border:`1px solid ${tab==="fito"?t["--fitoBrd"]:t["--tagBrd"]}`,fontFamily:t["--mono"],flexShrink:0}}>{ranked.length} resultado{ranked.length!==1?"s":""}</span>
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
                  {[...sel].map(s=>{const label=ALL.find(i=>i.id===s)?.label||s;const isChr=CHRONIC_IDS.has(s);return(<span key={s} className="pg-pill" onClick={()=>toggle(s)} style={{fontSize:10.5,padding:"3px 10px",borderRadius:isInd?"2px":"20px",background:isChr?t["--chronicBg"]:t["--accentBg"],color:isChr?t["--chronicText"]:t["--accentText"],border:`1px solid ${isChr?t["--chronicBrd"]:t["--accentBrd"]}`,cursor:"pointer",transition:"opacity .15s",fontFamily:t["--sans"]}} title="Clique para remover">{label} ×</span>);})}
                </div>
                {ranked.length===0?(tab==="fito"?<FitoEmpty t={t}/>:tab==="fp"?<ProgramEmpty tipo="fp" t={t}/>:tab==="sus"?<ProgramEmpty tipo="sus" t={t}/>:<ConvEmpty t={t}/>):(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:9}}>
                    {ranked.map(({m,score})=><MedCard key={m.id} m={m} score={score} max={maxScore} f={f} sel={sel} onSelectMed={openMedDetail}/>)}
                  </div>
                )}
                <div style={{marginTop:18,padding:"10px 13px",borderRadius:t["--radiusSm"],background:t["--dangerBg"],border:`1px solid ${t["--dangerBrd"]}`,fontSize:11,color:t["--dangerTxt"],lineHeight:1.7,fontFamily:t["--sans"]}}>
                  <strong>⚕️ Aviso:</strong> Guia auxiliar para agentes de saúde da ONG. Não substitui avaliação médica. Fitoterápicos possuem contraindicações e interações. Condições crônicas requerem tratamento médico adequado.
                </div>
                <div style={{height:20}}/>
              </>
            )}
          </div>
        </div>
      </div>
        {/* DRUG DETAIL PANEL */}
        {medStack.length>0&&(
          <DrugDetailPanel
            stack={medStack}
            onClose={closeMedDetail}
            onBack={goBackDetail}
            onOpen={openMedDetail}
            f={f}
          />
        )}
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<FarmaciaONG/>);
</script>
</body>
</html>
